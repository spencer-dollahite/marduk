name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # Pinned to the tested major — macos-latest drifting under us would
    # conflate "our regression" with "new macOS". future-macos.yml probes
    # newer images on demand.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain
        run: swift --version

      # Marduk's own update gate refuses builds with ANY warning —
      # CI enforces the same bar so a push that would fail on the
      # user's Mac fails here first.
      - name: Build (zero warnings)
        run: |
          set -o pipefail
          swift build 2>&1 | tee build.log
          if grep -qi "warning:" build.log; then
            echo "::error::warnings present — marduk's update gate would refuse this build"
            exit 1
          fi

      - name: Test
        run: swift test --enable-code-coverage

      # Coverage is REPORTED, never gated. A percentage target invites
      # tests written to move the number; this exists so "how much of
      # this file does anything actually execute" has an answer instead
      # of an estimate — and so a file at 0% is visible rather than
      # assumed covered. Best-effort: never fails the build.
      - name: Coverage by file
        continue-on-error: true
        run: |
          BIN=$(swift build --show-bin-path)
          PROF="$BIN/codecov/default.profdata"
          XCTEST=$(find "$BIN" -name '*.xctest' -maxdepth 1 | head -1)
          TARGET="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
          [ -f "$PROF" ] && [ -f "$TARGET" ] || { echo "no coverage data"; exit 0; }
          xcrun llvm-cov report "$TARGET" -instr-profile "$PROF" \
            -ignore-filename-regex='(Tests|\.build)/' 2>/dev/null \
            | sort -k4 -n | tee coverage.txt
          echo "::notice::least-covered files are listed first"

      # The closest a headless runner gets to E2E: the daemon boots
      # without Karabiner or any TCC grant (exactly a fresh install's
      # worst case), serves its socket, answers status, and exits clean
      # on stop. Catches the "does it even start" class that safe mode
      # exists to worry about.
      - name: Smoke (daemon boots, serves socket, stops clean)
        run: |
          .build/debug/marduk start --foreground &
          DAEMON=$!
          ok=0
          for i in $(seq 1 30); do
            if .build/debug/marduk status | grep -q "Daemon:  running"; then ok=1; break; fi
            sleep 1
          done
          .build/debug/marduk status || true
          test "$ok" -eq 1
          .build/debug/marduk stop
          for i in $(seq 1 15); do kill -0 $DAEMON 2>/dev/null || break; sleep 1; done
          if wait $DAEMON; then EXIT=0; else EXIT=$?; fi
          echo "daemon exit code: $EXIT"
          test "$EXIT" -eq 0
